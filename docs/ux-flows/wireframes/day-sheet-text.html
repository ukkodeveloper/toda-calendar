<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Sheet · Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #e0e0e0; display: flex; justify-content: center; padding: 20px 0; }
    .wf-screen { width: 375px; min-height: 812px; background: linear-gradient(to bottom, #f5f5f5 0 44%, #ededed 44% 100%); border: 2px dashed #ccc; display: flex; flex-direction: column; justify-content: flex-end; }
    .sheet { background: #fff; border-top: 2px dashed #ccc; border-radius: 24px 24px 0 0; padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 12px; }
    .wf-nav { display: flex; justify-content: space-between; align-items: center; color: #666; font-size: 14px; }
    .wf-link { color: inherit; text-decoration: none; }
    .wf-title { font-size: 18px; font-weight: 700; color: #444; text-align: center; flex: 1; }
    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .wf-button-secondary { background: transparent; border: 1px dashed #999; padding: 10px; font-size: 13px; color: #666; border-radius: 999px; text-align: center; }
    .active { background: #ececec; color: #444; }
    .wf-input, .wf-card { background: #fff; border: 1px dashed #ccc; border-radius: 12px; padding: 12px; color: #777; font-size: 14px; }
    .note-area { min-height: 160px; line-height: 1.5; }
    .wf-footer { font-size: 10px; color: #aaa; text-align: center; padding-top: 4px; border-top: 1px dashed #ddd; }
  </style>
</head>
<body>
  <div class="wf-screen">
    <div class="sheet">
      <div class="wf-nav">
        <a href="./month-home-text.html" class="wf-link">Cancel</a>
        <div class="wf-title">Wednesday, April 8</div>
        <a href="./month-home-text.html" class="wf-link">Done</a>
      </div>

      <div class="tabs">
        <a href="./day-sheet-photo.html" class="wf-link"><div class="wf-button-secondary">Photo</div></a>
        <a href="./day-sheet-doodle.html" class="wf-link"><div class="wf-button-secondary">Doodle</div></a>
        <a href="./day-sheet-text.html" class="wf-link"><div class="wf-button-secondary active">Text</div></a>
      </div>

      <div class="wf-input">Title (optional)</div>
      <div class="wf-card note-area">Write something about the day. The sheet stays compact and keeps copy minimal.</div>
      <div class="wf-button-secondary" style="align-self: flex-start; padding: 9px 14px;">Clear</div>

      <div class="wf-footer">Screen: Day Sheet · Text Tab · Use cases: UC-003, UC-004</div>
    </div>
  </div>
</body>
</html>
